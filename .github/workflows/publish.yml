name: Release & Publish Package to NPM

# Triggered on push to main/staging or manual dispatch.
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - staging
    paths-ignore:
      - 'docs/**'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: Publish
    steps:
      - name: Get CI Bot Token
        uses: actions/create-github-app-token@v3
        id: ci_bot_token
        with:
          client-id: ${{ vars.PUBLISH_CI_APP_CLIENT_ID }}
          private-key: ${{ secrets.PUBLISH_CI_APP_KEY }}

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.ci_bot_token.outputs.token }}

      - name: Initialize Git User
        run: |
          git config --global user.email "github-actions[bot]@genlayer.com"
          git config --global user.name "github-actions[bot]"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Release
        run: |
          if [ "${{ github.ref_name }}" = "staging" ]; then
            npm run release-beta
          else
            npm run release
          fi
        env:
          GITHUB_TOKEN: ${{ steps.ci_bot_token.outputs.token }}
